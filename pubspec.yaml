name: citizen_voice_portal
description: "A premium politician accountability and civic engagement mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Typography pairing
  google_fonts: ^6.1.0

  # State management for live comments, upvotes, dynamic reports feed
  provider: ^6.1.2

  # Google Maps for ward boundaries, incident maps, and location display
  google_maps_flutter: ^2.10.0

  # Mock file selection for issue reporting
  image_picker: ^1.0.7

  # Date formats
  intl: ^0.19.0

  # Supabase: Auth, Database, Storage, Realtime
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
