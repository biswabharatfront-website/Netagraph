<script>

document.addEventListener('click', function(e) {
  const link = e.target.closest('a[href]');

    e.preventDefault();
    document.body.classList.add('page-exit');
    setTimeout(function(){ window.location.href = link.href; }, 350);
  }
});
// Wrap onclick navigations
const origLocationSet = Object.getOwnPropertyDescriptor(window, 'location');

<script>
        function toggleChip(chip) {
            const allChips = document.querySelectorAll('.category-chip');
            allChips.forEach(c => {
                c.classList.remove('bg-primary/20', 'border-primary', 'text-primary');
                c.classList.add('bg-surface-elevated', 'border-white/10', 'text-on-surface-variant');
            });
            
            chip.classList.remove('bg-surface-elevated', 'border-white/10', 'text-on-surface-variant');
            chip.classList.add('bg-primary/20', 'border-primary', 'text-primary');
        }

        // Default select the first chip
        document.addEventListener('DOMContentLoaded', () => {
            const firstChip = document.querySelector('.category-chip');
            if (firstChip) toggleChip(firstChip);
        });
    </script>
