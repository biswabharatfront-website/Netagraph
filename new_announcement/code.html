<script>

document.addEventListener('click', function(e) {

    e.preventDefault();
    document.body.classList.add('page-exit');
    setTimeout(function(){ window.location.href = link.href; }, 350);
  }
});
// Wrap onclick navigations
const origLocationSet = Object.getOwnPropertyDescriptor(window, 'location');

<script>
        function selectUrgency(el, type) {
            // Remove active state from all chips
            document.querySelectorAll('.urgency-chip').forEach(chip => {
                chip.classList.remove('active', 'border-primary/40');
                chip.classList.add('border-white/10');
            });
            
            // Add active state to selected
            el.classList.add('active', 'border-primary/40');
            el.classList.remove('border-white/10');
            
            // Interaction feedback
            el.classList.add('scale-95');
            setTimeout(() => el.classList.remove('scale-95'), 100);
        }

        // Simple animation for the header on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('bg-background/95', 'backdrop-blur-md');
            } else {
                header.classList.remove('bg-background/95', 'backdrop-blur-md');
            }
        });
    </script>
