<style>
/* Premium page transitions */
@keyframes pageEnter { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes pageExit { to { opacity:0; transform:translateY(-16px) scale(0.98); } }
body { animation: pageEnter 0.5s cubic-bezier(0.16,1,0.3,1) both; }
body.page-exit { animation: pageExit 0.4s cubic-bezier(0.55,0,1,0.45) forwards; }
</style>
<script>
// Intercept all internal navigation for smooth transitions
document.addEventListener('click', function(e) {
  const link = e.target.closest('a[href]');
  if (link && link.href && link.href.startsWith(window.location.origin) && !link.href.includes('#')) {
    e.preventDefault();
    document.body.classList.add('page-exit');
    setTimeout(function(){ window.location.href = link.href; }, 350);
  }
});
// Wrap onclick navigations
const origLocationSet = Object.getOwnPropertyDescriptor(window, 'location');
window._smoothNav = function(url) {
  document.body.classList.add('page-exit');
  setTimeout(function(){ window.location.href = url; }, 350);
};
</script>

<script>
        // Micro-interactions for tab switching
        const phoneTab = document.getElementById('phone-tab');
        const emailTab = document.getElementById('email-tab');
        const mobileInput = document.getElementById('mobile-number');
        const otpContainer = document.getElementById('otp-container');

        phoneTab.addEventListener('click', () => {
            phoneTab.classList.add('bg-primary-container', 'text-on-primary-container');
            phoneTab.classList.remove('text-slate');
            emailTab.classList.remove('bg-primary-container', 'text-on-primary-container');
            emailTab.classList.add('text-slate');
            mobileInput.placeholder = "+1 (555) 000-0000";
            mobileInput.type = "tel";
            otpContainer.style.display = 'block';
        });

        emailTab.addEventListener('click', () => {
            emailTab.classList.add('bg-primary-container', 'text-on-primary-container');
            emailTab.classList.remove('text-slate');
            phoneTab.classList.remove('bg-primary-container', 'text-on-primary-container');
            phoneTab.classList.add('text-slate');
            mobileInput.placeholder = "Enter your verified email";
            mobileInput.type = "email";
            otpContainer.style.display = 'none';
        });

        // Form submission prevention for demo
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = 'Verifying...';
            btn.classList.add('opacity-80');
            setTimeout(() => {
                btn.innerHTML = 'Access Granted';
                btn.classList.replace('brand-gradient', 'bg-success');
            }, 1500);
        });
    </script>
