<style>

        /* Transition & Animation Tokens from Design System */
        .page-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        .entrance-slide-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-interact {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-interact:active {

<!-- Contextual JavaScript for Interactions -->
<script>
        function navigateWithTransition(url) {
            document.body.classList.add('transition-opacity', 'duration-300', 'opacity-0');
            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const primaryBtn = document.querySelector('button.bg-gradient-to-r');
            
            // Subtle hover glow effect on interaction
            primaryBtn.addEventListener('mousemove', (e) => {
                const rect = primaryBtn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                primaryBtn.style.setProperty('--mouse-x', `${x}px`);
                primaryBtn.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
