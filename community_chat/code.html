<script>
// Intercept all internal navigation for smooth transitions
document.addEventListener('click', function(e) {
  const link = e.target.closest('a[href]');
  if (link && link.href && link.href.startsWith(window.location.origin) && !link.href.includes('#')) {
    e.preventDefault();
    document.body.classList.add('page-exit');
    setTimeout(function(){ window.location.href = link.href; }, 350);
  }
});
// Wrap onclick navigations
const origLocationSet = Object.getOwnPropertyDescriptor(window, 'location');
window._smoothNav = function(url) {
  document.body.classList.add('page-exit');
  setTimeout(function(){ window.location.href = url; }, 350);
};
</script>

    let activeThreadId = 'channel-general';

    // Switch between Channels and Direct Messages in the sidebar
    function switchInboxTab(tab) {
      const btnChannels = document.getElementById('tab-channels');
      const btnDms = document.getElementById('tab-dms');
      const listChannels = document.getElementById('channels-list');
      const listDms = document.getElementById('dms-list');

      if (tab === 'channels') {
        btnChannels.className = "flex-1 py-2 rounded-xl text-label-md font-bold transition-all bg-primary-container text-on-primary-container active:scale-95 duration-150";
        btnDms.className = "flex-1 py-2 rounded-xl text-label-md font-bold transition-all text-slate hover:text-on-surface active:scale-95 duration-150";
        listChannels.classList.remove('hidden');
        listDms.classList.add('hidden');
      } else {
        btnDms.className = "flex-1 py-2 rounded-xl text-label-md font-bold transition-all bg-primary-container text-on-primary-container active:scale-95 duration-150";
        btnChannels.className = "flex-1 py-2 rounded-xl text-label-md font-bold transition-all text-slate hover:text-on-surface active:scale-95 duration-150";
        listChannels.classList.add('hidden');
        listDms.classList.remove('hidden');
      }
    }

    // Load selected chat thread in the active window
    function loadChatThread(threadId, title, subtitle, avatarUrl) {
      activeThreadId = threadId;
      const thread = chatDatabase[threadId];

      // Highlight active sidebar item
      document.querySelectorAll('#channels-list button, #dms-list button').forEach(btn => {
        btn.classList.remove('border-primary-container/20', 'bg-surface-elevated/20', 'active-glow');
      });
      document.getElementById('btn-' + threadId).classList.add('border-primary-container/20', 'bg-surface-elevated/20', 'active-glow');

      // Update header
      document.getElementById('active-chat-title').innerText = title;
      document.getElementById('active-chat-subtitle').innerText = subtitle;

      const avatarIcon = document.getElementById('active-chat-avatar-icon');
      const avatarContainer = document.getElementById('active-chat-avatar-container');
      
      if (thread.isDm) {
        avatarIcon.classList.add('hidden');
        avatarContainer.innerHTML = `<img src="${avatarUrl || thread.avatar}" class="w-full h-full object-cover rounded-xl">`;
      } else {
        avatarIcon.classList.remove('hidden');
        avatarIcon.innerText = thread.icon;
        avatarContainer.innerHTML = `<span class="material-symbols-outlined text-[18px]" id="active-chat-avatar-icon">${thread.icon}</span>`;
      }

      renderMessages();
    }

    // Render messages in the chat box
    function renderMessages() {
      const messagesBox = document.getElementById('messages-box');
      messagesBox.innerHTML = '';
      const thread = chatDatabase[activeThreadId];

      thread.messages.forEach(msg => {
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = `flex gap-3 max-w-[85%] ${msg.incoming ? 'mr-auto' : 'ml-auto flex-row-reverse text-right'}`;

        let avatarHtml = '';
        if (msg.incoming) {
          if (msg.avatar) {
            avatarHtml = `<img src="${msg.avatar}" class="w-8 h-8 rounded-full object-cover shrink-0">`;
          } else {
            avatarHtml = `
              <div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center shrink-0 border border-white/10">
                <span class="text-[10px] font-bold text-slate">${msg.sender.substring(0, 2).toUpperCase()}</span>
              </div>
            `;
          }
        }

        bubbleDiv.innerHTML = `
          ${avatarHtml}
          <div class="flex flex-col gap-1">
            <span class="text-[10px] text-slate font-bold">${msg.sender} <span class="font-medium ml-1">${msg.time}</span></span>
            <div class="p-3 rounded-2xl text-xs text-white leading-relaxed ${msg.incoming ? 'chat-bubble-received' : 'chat-bubble-sent'}">
              ${msg.text}
            </div>
          </div>
        `;

        messagesBox.appendChild(bubbleDiv);
      });

      // Scroll to bottom
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    // Handle keypress inside chat input
    function handleKeyPress(e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    }

    // Send a new message
    function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      const thread = chatDatabase[activeThreadId];
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      // Add to database
      const newMsg = {
        sender: 'Arjun Mehta',
        avatar: 'https://lh3.googleusercontent.com/aida-public/AB6AXuD641rzSL81RuPUYkYa6vnYE9n1PX2x2kPLpY-NNHcrj3ddY91941XtgXwhia7V4CiSsEOSyoQycWqfLSVNtVACT34rQhVl7HSQK5B2utc8Mro2cPsJaqQkBGL8pX_1OhEL8shKK3MwUb3bEzPQiXdleC_Q4DOR_vAKpNWE5f86ZKpCszmMeUeNEavWNlknkF5BQbaVfI2gj5FHbAbB4kXMrZn9etdYMnaYKvl9MixiZK5l29sd-4joADy2dZOE1lIdImZyLIebYxV0',
        text: text,
        time: timeStr,
        incoming: false
      };

      thread.messages.push(newMsg);
      input.value = '';

      // Append to DOM immediately with animation
      const messagesBox = document.getElementById('messages-box');
      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = `flex gap-3 max-w-[85%] ml-auto flex-row-reverse text-right new-message`;
      bubbleDiv.innerHTML = `
        <div class="flex flex-col gap-1">
          <span class="text-[10px] text-slate font-bold">Arjun Mehta <span class="font-medium ml-1">${timeStr}</span></span>
          <div class="p-3 rounded-2xl text-xs text-white leading-relaxed chat-bubble-sent">
            ${text}
          </div>
        </div>
      `;
      messagesBox.appendChild(bubbleDiv);
      messagesBox.scrollTop = messagesBox.scrollHeight;

      // Trigger automatic mock reply after 1.5 seconds
      triggerAutoMockReply();
    }

    // Initial render
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const tab = urlParams.get('tab');
      if (tab === 'dms') {
        switchInboxTab('dms');
      } else if (tab === 'channels') {

      renderMessages();
